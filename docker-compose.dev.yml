services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: orthoscan-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: orthoscan-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
