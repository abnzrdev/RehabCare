services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      REHAB_DB_PATH: /data/rehab.db
      REHAB_IMU_CSV_PATH: /data/imu_data.csv
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - rehab_data:/data
      - ./rehab_platform/models:/app/rehab_platform/models:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)); raise SystemExit(0 if data.get('status') == 'ok' else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  rehab_data:
